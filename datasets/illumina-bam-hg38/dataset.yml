# Typed reference dataset — illumina-bam-hg38 (autosomal)
# Matched against a manifest's `inputs.type: illumina-bam-hg38` for the external
# verification leg. BAM slices live in illumina_slices/ (pre-built, committed).

type: "illumina-bam-hg38"
data: "illumina_slices/NA12878.autosomal.bam"
bam_index: "illumina_slices/NA12878.autosomal.bam.bai"
format: "bam"
reference: "hg38"

# Reference genome — automatically downloaded and mounted by the harness.
# Tools that need --fasta (HipSTR, GangSTR, ExpansionHunter, etc.) use this path.
reference_genome:
  assembly: "GRCh38 / hg38"
  url: "https://hgdownload.soe.ucsc.edu/goldenPath/hg38/bigZips/hg38.fa.gz"
  filename: "hg38.fa"
  mount_path: "/data/ref/hg38.fa"

name: "Illumina BAM (hg38) — NA12878 (autosomal, mujer)"
source: "https://ftp-trace.ncbi.nlm.nih.gov/ReferenceSamples/giab/data/NA12878/NIST_NA12878_HG001_HiSeq_300x/"
license: >
  Open access (GIAB / NIST). Research and educational use.
  STRhub is not the data provider.
sequencer: "Illumina HiSeq 2500 (GIAB 300x)"
notes: >
  GIAB NA12878/HG001 300x WGS, aligned to GRCh38, sliced around 24 autosomal
  forensic STR loci (CODIS 20 + PentaD + PentaE + D6S1043 + SE33) with ±1000bp
  flanking. ~200-350x per locus. Pick this dataset for autosomal/CODIS tools.
  Female sample — contains NO Y-chromosome markers (use illumina-bam-hg38-y for
  Y-STR tools). See SOURCE.txt.
