name: STRhub Verified

# Surface the dispatch id in the run name so the web backend can correlate a
# workflow_dispatch (which returns no run id, §10) back to its run.
run-name: >-
  Verify ${{ github.event.inputs.tool || 'strait-razor-PowerSeqv2.31' }}${{ github.event.inputs.dispatch_id && format(' [{0}]', github.event.inputs.dispatch_id) || '' }}

# The engine. Each gate is a CI step; failures are captured (continue-on-error)
# so the report is always produced and reflects the furthest gate cleared.
on:
  workflow_dispatch:
    inputs:
      tool:
        # Free-form so self-service submissions (any slug under tools/) work, not
        # just the maintainer's built-in variants.
        description: "Tool variant to verify (directory under tools/)"
        type: string
        default: "strait-razor-PowerSeqv2.31"
        required: true
      dispatch_id:
        description: "Unique id echoed in run-name for dispatch→run correlation"
        type: string
        required: false
        default: ""
  pull_request:
    paths:
      - "tools/**"
      - "harness/**"
  schedule:
    - cron: "0 6 1 * *"   # monthly re-verification so badges never go stale

permissions:
  contents: write   # deploy step pushes reports to the gh-pages branch

jobs:
  verify:
    runs-on: ubuntu-22.04   # free, unlimited on public repos
    env:
      TOOL: ${{ github.event.inputs.tool || 'strait-razor-PowerSeqv2.31' }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true   # fixtures may be stored with Git LFS

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pyyaml jsonschema

      # --- Prepare: read manifest, resolve external dataset, stage inputs -----
      # prepare.py stages each matrix leg: work/in_own (BYOR, local or remote)
      # and work/in_external (typed dataset from datasets/, or N/A).
      - id: m
        name: Prepare run (manifest + dataset matrix)
        run: python harness/prepare.py "$TOOL" --work work >> "$GITHUB_OUTPUT"

      # --- Reference genome (for BAM-based tools needing --fasta) -------------
      - name: Cache reference genome
        if: steps.m.outputs.ref_genome_url != ''
        uses: actions/cache@v4
        id: ref-cache
        with:
          path: work/ref
          key: ref-${{ steps.m.outputs.ref_genome_filename }}-v1

      - name: Download + index reference genome
        if: steps.m.outputs.ref_genome_url != '' && steps.ref-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p work/ref
          echo "::group::Downloading ${{ steps.m.outputs.ref_genome_filename }}"
          curl -fsSL "${{ steps.m.outputs.ref_genome_url }}" | gunzip > "work/ref/${{ steps.m.outputs.ref_genome_filename }}"
          echo "::endgroup::"
          echo "::group::Indexing with samtools faidx"
          sudo apt-get install -y -qq samtools >/dev/null 2>&1
          samtools faidx "work/ref/${{ steps.m.outputs.ref_genome_filename }}"
          echo "::endgroup::"
          ls -lh work/ref/

      # --- Gate: Available ----------------------------------------------------
      - id: available
        name: "Gate · Available"
        continue-on-error: true
        run: git ls-remote "${{ steps.m.outputs.repo }}" >/dev/null

      # --- Gate: Installs (docker build) -------------------------------------
      - id: installs
        name: "Gate · Installs"
        continue-on-error: true
        run: |
          docker build \
            --build-arg STRAITRAZOR_REF=${{ steps.m.outputs.ref }} \
            --build-arg TOOL_REF=${{ steps.m.outputs.ref }} \
            -f ${{ steps.m.outputs.dockerdir }}/${{ steps.m.outputs.dockerfile }} \
            -t toolimg:ci \
            ${{ steps.m.outputs.dockerdir }}

      # --- Matrix leg: own data (the badge ladder uses THIS leg) -------------
      - id: runs
        name: "Gate · Runs (own data)"
        if: steps.m.outputs.own_ready == '1'
        continue-on-error: true
        timeout-minutes: ${{ fromJSON(steps.m.outputs.timeout) }}
        run: |
          set -o pipefail
          mkdir -p work/out_own
          REF_MOUNT=""
          [ -d work/ref ] && REF_MOUNT="-v $PWD/work/ref:/data/ref:ro"
          docker run --rm \
            -v "$PWD/work/in_own:/data/in:ro" \
            -v "$PWD/work/out_own:/data/out" \
            $REF_MOUNT \
            toolimg:ci \
            "${{ steps.m.outputs.cmd }}" 2>&1 | tee work/log_own.txt

      - id: io
        name: "Gate · Expected IO (own)"
        if: steps.m.outputs.own_ready == '1'
        continue-on-error: true
        run: python harness/check_io.py "${{ steps.m.outputs.manifest }}" work/out_own --json io_own.json

      - id: content
        name: "Gate · Content (own)"
        if: steps.m.outputs.own_ready == '1'
        continue-on-error: true
        run: python harness/check_content.py "${{ steps.m.outputs.manifest }}" work/out_own --json content_own.json

      # --- Matrix leg: external typed dataset (N/A if no compatible dataset) --
      - id: runs_ext
        name: "Runs (external data)"
        if: steps.m.outputs.external_ready == '1'
        continue-on-error: true
        timeout-minutes: ${{ fromJSON(steps.m.outputs.timeout) }}
        run: |
          set -o pipefail
          mkdir -p work/out_external
          REF_MOUNT=""
          [ -d work/ref ] && REF_MOUNT="-v $PWD/work/ref:/data/ref:ro"
          docker run --rm \
            -v "$PWD/work/in_external:/data/in:ro" \
            -v "$PWD/work/out_external:/data/out" \
            $REF_MOUNT \
            toolimg:ci \
            "${{ steps.m.outputs.cmd }}" 2>&1 | tee work/log_external.txt

      - id: io_ext
        name: "Expected IO (external)"
        if: steps.m.outputs.external_ready == '1'
        continue-on-error: true
        run: python harness/check_io.py "${{ steps.m.outputs.manifest }}" work/out_external --json io_external.json

      - id: content_ext
        name: "Content (external)"
        if: steps.m.outputs.external_ready == '1'
        continue-on-error: true
        run: python harness/check_content.py "${{ steps.m.outputs.manifest }}" work/out_external --json content_external.json

      # --- README minimum-to-run check (advisory; never gates the badge) ------
      - name: "README check (advisory)"
        if: always()
        continue-on-error: true
        run: |
          repo="${{ steps.m.outputs.repo }}"; ref="${{ steps.m.outputs.ref }}"
          slug="${repo#https://github.com/}"; slug="${slug%.git}"
          rm -f readme.md
          for name in README.md readme.md README.MD README.rst README.txt README; do
            if curl -fsSL "https://raw.githubusercontent.com/${slug}/${ref}/${name}" -o readme.md; then break; fi
          done
          [ -f readme.md ] || echo -n > readme.md
          python harness/check_readme.py readme.md --json readme_result.json

      # --- Assemble the matrix (own + external legs) -------------------------
      - name: Assemble matrix
        if: always()
        env:
          OWN_READY: ${{ steps.m.outputs.own_ready }}
          EXT_READY: ${{ steps.m.outputs.external_ready }}
          INPUT_TYPE: ${{ steps.m.outputs.input_type }}
          DATASET_NAME: ${{ steps.m.outputs.dataset_name }}
          FIXTURE_SOURCE: ${{ steps.m.outputs.fixture_source }}
        run: |
          python - <<'PY'
          import json, os, pathlib
          def load(p):
              q = pathlib.Path(p)
              try:
                  return json.loads(q.read_text()) if q.exists() else None
              except Exception:
                  return None
          legs = []
          own_io, own_ct = load("io_own.json"), load("content_own.json")
          fixture_source = os.environ.get("FIXTURE_SOURCE", "strhub")
          own_label = "Your data" if fixture_source == "tool" else "STRhub fixture"
          legs.append({
              "leg": "own", "label": own_label,
              "available": os.environ.get("OWN_READY") == "1",
              "io": bool(own_io and own_io.get("passed")),
              "content": bool(own_ct and own_ct.get("passed")),
              "passed": bool(own_io and own_io.get("passed")),
              "fixture_source": fixture_source,
          })
          ext_io, ext_ct = load("io_external.json"), load("content_external.json")
          legs.append({
              "leg": "external", "label": "External data",
              "available": os.environ.get("EXT_READY") == "1",
              "type": os.environ.get("INPUT_TYPE") or None,
              "dataset": os.environ.get("DATASET_NAME") or None,
              "io": bool(ext_io and ext_io.get("passed")),
              "content": bool(ext_ct and ext_ct.get("passed")),
              "passed": bool(ext_io and ext_io.get("passed")),
          })
          pathlib.Path("matrix.json").write_text(json.dumps(legs, indent=2))
          print(json.dumps(legs, indent=2))
          PY

      # --- Assemble attestation (always runs) --------------------------------
      - name: Build attestation + badge
        if: always()
        run: |
          python harness/report.py \
            --manifest "${{ steps.m.outputs.manifest }}" \
            --available ${{ steps.available.outcome }} \
            --installs ${{ steps.installs.outcome }} \
            --runs ${{ steps.runs.outcome }} \
            --io io_own.json \
            --content content_own.json \
            --matrix matrix.json \
            --readme readme_result.json \
            --log-own work/log_own.txt \
            --log-external work/log_external.txt \
            --ref ${{ steps.m.outputs.ref }} \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      # Render the human-readable summary on the run's "Summary" page (no download
      # needed). $GITHUB_STEP_SUMMARY accepts Markdown.
      - name: Publish summary to run page
        if: always()
        run: |
          for f in reports/*.summary.md; do
            [ -f "$f" ] && cat "$f" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload attestation
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: attestation-${{ env.TOOL }}
          path: reports/

      # Publish a navigable web page (index + per-tool HTML) to the gh-pages
      # branch. Reports accumulate across runs: we clone the existing branch,
      # drop in this run's files, regenerate the index, and push.
      - name: Deploy reports to GitHub Pages
        if: always() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          remote="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          tmp="$(mktemp -d)"
          if git ls-remote --exit-code --heads "$remote" gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$remote" "$tmp"
          else
            git clone --depth 1 "$remote" "$tmp"
            git -C "$tmp" checkout --orphan gh-pages
            git -C "$tmp" rm -rfq . || true
          fi
          cp -f reports/* "$tmp/" 2>/dev/null || true
          touch "$tmp/.nojekyll"
          python harness/build_index.py "$tmp" --out "$tmp/index.html"
          cd "$tmp"
          git add -A
          if git diff --cached --quiet; then echo "no changes to publish"; exit 0; fi
          git commit -m "deploy ${TOOL} @ run ${{ github.run_id }}"
          for i in 1 2 3; do
            git push "$remote" gh-pages && break || { git pull --rebase "$remote" gh-pages || true; sleep 3; }
          done

      # To publish badges, commit reports/ to a gh-pages branch (or use
      # actions/deploy-pages). strhub.app then fetches reports/<tool>.badge.json
      # as a shields.io endpoint:
      #   https://img.shields.io/endpoint?url=<raw-url-to>/<tool>.badge.json
