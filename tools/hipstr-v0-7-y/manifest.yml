# STRhub Verified manifest — HipSTR (Y-STR variant).
# Same tool + pinned ref as hipstr-v0-7, but verified against the Y-STR reference
# dataset (GIAB HG002). Demonstrates the illumina-bam-hg38-y leg end to end.
# Verification metadata only; STRhub stores no tool source code.

tool:
  name: hipstr
  version: v0.7
source:
  repo: "https://github.com/tfwillems/HipSTR"
  ref: b2033bfbb5cf55496b776463bdf2993fa763a4be
report:
  slug: "hipstr-v0-7-y"
environment:
  dockerfile: Dockerfile
  os: ["ubuntu-22.04"]
run:
  cmd: "HipSTR --bams /data/in/input.bam --fasta /data/ref/hg38.fa --regions /data/in/regions.bed --str-vcf /data/out/result.vcf.gz --min-reads 5 --use-unpaired --read-qual-trim ! --def-stutter-model --max-str-len 250"
  timeout_minutes: 15
inputs:
  type: "illumina-bam-hg38-y"
  fixture: "illumina_slices/HG002.ystr.bam"
outputs:
  - path: result.vcf.gz
    format: vcf
    min_records: 1
    # VCF columns: 0=CHROM 1=POS 2=ID(locus) 3=REF 4=ALT 5=QUAL 6=FILTER 7=INFO 8=FORMAT 9+=SAMPLE
    content:
      locus_column: 2
      dna_column: 3
      min_distinct_loci: 1
