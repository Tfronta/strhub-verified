# STRhub Verified manifest — generated from a self-service submission.
# Verification metadata only; STRhub stores no tool source code. The
# Dockerfile clones the author's PUBLIC repo at the pinned ref at build time.

tool:
  name: GangSTR
  version: v2.5
source:
  repo: "https://github.com/gymreklab/gangstr"
  ref: "6ea9b2b8daca51dcab1f0e46210622b94b52ff17"
report:
  slug: "gangstr-v2-5"
environment:
  dockerfile: Dockerfile
  os: ["ubuntu-22.04"]
run:
  cmd: "GangSTR --bam /data/in/input.bam --ref /data/ref/hg38.fa --regions /data/in/regions.bed --out /data/out/output"
  timeout_minutes: 20
inputs:
  type: "illumina-bam-hg38"
  fixture: "illumina_slices/NA12878.autosomal.bam"
outputs:
- path: output.vcf
  format: vcf
  min_records: 1
