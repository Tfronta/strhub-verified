# STRhub Verified manifest — STRait Razor v3 (Verogen ForenSeq variant)
# Same tool/commit as tools/strait-razor-PowerSeqv2.31; this directory exists so the harness
# can verify the ForenSeq assay path (ForenSeqv1.27.config) against real
# Illumina MiSeq reads, alongside the PowerSeq path.

tool:
  name: STRait Razor
  version: "v3"
  maintainer: "Woerner AE, King JL (UNT Center for Human Identification)"
  contact: "https://github.com/Ahhgust/STRaitRazor/issues"   # failure reports go here

source:
  repo: "https://github.com/Ahhgust/STRaitRazor"
  ref: "b618e9345ab40f348b504083ae8de2b39abb60fa"

report:
  slug: "strait-razor-ForenSeqv1.27"   # distinct badge per assay/config variant

environment:
  dockerfile: "Dockerfile"
  os:
    - "ubuntu-22.04"

run:
  # Executed inside the container. /data/in = read-only fixture, /data/out = writable.
  # ForenSeq reads -> ForenSeqv1.27.config (lives at the repo root, confirmed at the
  # pinned ref). The fixture is a Verogen ForenSeq Signature Prep single-source sample.
  cmd: >
    str8rzr -c /opt/strait-razor/ForenSeqv1.27.config
    /data/in/sample.fastq > /data/out/sample.allsequences.txt
  timeout_minutes: 15

inputs:
  fixture: "tools/strait-razor-ForenSeqv1.27/fixtures/nist-mds2-2157"
                                       # Real NIST mds2-2157 ForenSeq reads (NTD01).

outputs:
  - path: "*.allsequences.txt"
    format: "tsv"
    min_records: 1              # guard against exit-0-but-empty silent failure
    # str8rzr allsequences columns: 0=Locus:allele 1="N bases" 2=sequence 3=fwd 4=rev
    content:
      columns: 5
      dna_column: 2
      count_columns: [3, 4]
      locus_column: 0
      locus_sep: ":"
      min_distinct_loci: 50        # total panel markers; ForenSeq config has 226
                                   # (~62 STR/X/Y-STR + 164 iSNPs). The report breaks
                                   # these out as STR loci vs identity SNPs separately.
      min_total_reads: 500
      expect_loci: ["Amelogenin", "CSF1PO", "TH01", "TPOX", "vWA",
                    "D3S1358", "D8S1179", "D18S51", "D21S11", "FGA"]
